	<script>
		var buildUrl = "Build";
		var versionFolder = "25051901/";
		var cdnParam = new URLSearchParams(window.location.search).get("cdn");
                            if (!cdnParam && window.location.hostname.includes(".")) {
                            var parts = window.location.hostname.split(".");
                            if (parts.length > 2) {
                                cdnParam = "1";
                            }
                        }
var baseUrl = cdnParam === "2" ? "ubg42.github.io/Slope2" : "ubg42.github.io/Slope2";
buildUrl = baseUrl + versionFolder + buildUrl;
		var loaderUrl = buildUrl + "/slope-2-v25051901.loader.js";
		var config = {
			dataUrl: buildUrl + "/slope-2-v25051901.data.unityweb",
			frameworkUrl: buildUrl + "/slope-2-v25051901.framework.js.unityweb",
			codeUrl: buildUrl + "/slope-2-v25051901.wasm.unityweb",
			streamingAssetsUrl: versionFolder+"StreamingAssets",
			companyName: "1games.io",
			productName: "Slope 2",
			productVersion: "25051901",
			pubId: ""
		};
		config.hostindex = 2;
		config.gameId = "slope-2";
		config.eventLog=true;
		config.buildAPI = "https://event.azgame.io/apiaz/event";
		let currentDate = new Date();
		let endLogDate = new Date("2025-06-06T10:39:22.168Z");
		if(currentDate>endLogDate){
			config.eventLog=false;
		}
		config.enableMoreGame="yes";
		config.enablePromotion = true;
		config.gdHost=isHostOnGD();
		if(config.gdHost){
			config.enableMoreGame="no";
			config.enablePromotion = false;
			config.eventLog = false;
			let pathSegments = window.location.pathname.split('/');
			config.gdGameId = pathSegments[1];
		}
		function isHostOnGD() {
			let domainParts = window.location.hostname.split('.');
			let mainDomain = domainParts.slice(-2).join('.');
			return (mainDomain=="ubg42.github.io");
		}
		
	</script>

	<script> 
		var progressElement = document.getElementById('progress_fill');
		var container =	document.getElementById("unity-container");
		var canvas =	document.getElementById("unity-canvas");
		var loadingBar = document.querySelector("#loadingBlock");
		var progressBarFull = document.querySelector("#progress_fill");
		var progress_text = document.querySelector(".gameloader-progress-info");
		let text_percent = "";
		var script = document.createElement("script");
		script.src = loaderUrl;
		script.onload = () => {
		createUnityInstance(canvas, config, (progress) => {
			progressElement.style.width = 100 * progress + "%";
			text_percent = "Downloading file: " + Math.round(progress*100) + "%";
			progress_text.innerText = text_percent;
			if (progress >= 99) {
				progress_text.innerText = "Game Loading ...";
			}
		}).then((unityInstance) => {
			window.unityInstance = unityInstance;
			setTimeout(function() {
				loadingBar.style.display = "none";
				window.focus();
			}, 2000);
			container.style.display = "block";
		}).catch((message) => {
			alert(message);
		});
		};
		document.body.appendChild(script);
	</script>
